name: Build Jocoding Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag
        required: true
        default: jocoding-workspace-analytics

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_VERSION=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/postiz-app:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/postiz-app:${{ github.sha }}
          provenance: false
          sbom: false
